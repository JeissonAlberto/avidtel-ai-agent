<!DOCTYPE html><html><head><meta charset="UTF-8"><title>AI Agent</title></head>
<body style="background:#0f172a;color:white;font-family:sans-serif;padding:20px">
<h1>AI AGENT</h1><p>By Jeisson Alberto</p>
<div style="background:#1e293b;padding:15px;border-radius:10px;margin-top:20px">
ONTs Online: <span id="o" style="color:#4ade80;font-weight:bold">--</span></div>
<div id="c" style="background:black;height:200px;overflow-y:auto;margin-top:20px;padding:10px;font-family:monospace"></div>
<input id="i" style="width:100%;margin-top:10px;padding:10px;background:#1e293b;color:white;border:1px solid #334155">
<button onclick="s()" style="width:100%;margin-top:10px;padding:10px;background:#2563eb;color:white;border:none;cursor:pointer">Enviar</button>
<script>
async function l(){const r=await fetch('/s');const d=await r.json();document.getElementById('o').innerText=d.o;}
async function s(){const i=document.getElementById('i');const c=document.getElementById('c');const m=i.value;i.value='';c.innerHTML+='<p>Tú: '+m+'</p>';const r=await fetch('/c',{method:'POST',body:JSON.stringify({message:m})});const d=await r.json();c.innerHTML+='<p style="color:#4ade80">AI: '+d.r+'</p>';c.scrollTop=c.scrollHeight;}
setInterval(l,5000);l();
</script></body></html>
